<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Touchable Water Orb Demo (OLED Black)</title>
  <style>
    :root {
      --bg: #000;
      --orb-core: rgba(60, 170, 255, 0.95);
      --orb-mid: rgba(25, 120, 255, 0.55);
      --orb-faint: rgba(0, 80, 200, 0.18);
      --ui: rgba(255,255,255,0.78);
      --warn: rgba(255,120,120,0.9);
    }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
    }
    #stage {
      position: fixed;
      inset: 0;
      background: var(--bg);
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    #video {
      position: absolute;
      left: -9999px;
      top: -9999px;
      width: 640px;
      height: 480px;
      opacity: 0;
      pointer-events: none;
    }
    #hud {
      position: absolute;
      left: 14px;
      top: 12px;
      color: var(--ui);
      font-size: 12px;
      line-height: 1.45;
      user-select: none;
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
    }
    #hud b {
      font-weight: 650;
    }
    #hud .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      margin-right: 6px;
    }
    #hud .warn {
      color: var(--warn);
    }
  </style>
</head>
<body>
  <div id="stage">
    <video id="video" playsinline></video>
    <canvas id="fx"></canvas>
    <canvas id="main"></canvas>
    <div id="hud">
      <span class="badge">Webcam + Hand Tracking</span>
      <span class="badge">2D Water Orb</span><br/>
      <b>操作</b>：人差し指で球に近づいて「突く」<br/>
      <span id="status">初期化中…</span>
    </div>
  </div>

  <!-- MediaPipe Hands (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <script>
    (() => {
      // ==== Canvas setup ====
      const canvas = document.getElementById("main");
      const fxCanvas = document.getElementById("fx");
      const ctx = canvas.getContext("2d");
      const fx = fxCanvas.getContext("2d");
      const statusEl = document.getElementById("status");
      const videoEl = document.getElementById("video");

      function resize() {
        const dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
        const w = Math.floor(window.innerWidth * dpr);
        const h = Math.floor(window.innerHeight * dpr);
        canvas.width = w;
        canvas.height = h;
        fxCanvas.width = w;
        fxCanvas.height = h;
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        fxCanvas.style.width = "100%";
        fxCanvas.style.height = "100%";
        state.dpr = dpr;
        state.w = w;
        state.h = h;
      }
      window.addEventListener("resize", resize, { passive: true });

      // ==== Utility ====
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const len2 = (x, y) => Math.hypot(x, y);

      // ==== Orb physics ====
      const state = {
        w: 0, h: 0, dpr: 1,
        t: 0,
        finger: { x: 0, y: 0, z: 0, present: false, pinch: 0 },
        orb: {
          x: 0, y: 0,
          vx: 0, vy: 0,
          r: 90,
          wobble: 0,
          wobbleV: 0,
          hitGlow: 0,
          lastHitAt: -999,
        },
        debug: { lastFPS: 0, fpsS: 0, fpsN: 0 },
        ready: false,
        warn: "",
      };

      function initOrb() {
        state.orb.x = state.w * 0.5;
        state.orb.y = state.h * 0.52;
        state.orb.vx = 0;
        state.orb.vy = 0;
        state.orb.r = Math.max(70, Math.min(state.w, state.h) * 0.10);
      }

      // Orb movement model:
      // ・中心に戻るバネ（中心点 anchor）
      // ・速度減衰
      // ・指が半径内に入ると押し出しインパルス
      // ・形状のぷよ感は「周方向の波」を時間で回す
      const anchor = { x: 0, y: 0 };
      function stepPhysics(dt) {
        const o = state.orb;
        anchor.x = state.w * 0.5;
        anchor.y = state.h * 0.52;

        const springK = 9.0;        // 復元の強さ
        const damping = 5.0;        // 減衰
        const wobbleK = 28.0;       // 形状波の戻り
        const wobbleD = 8.0;

        // Anchor spring
        const ax = (anchor.x - o.x) * springK;
        const ay = (anchor.y - o.y) * springK;

        o.vx += ax * dt;
        o.vy += ay * dt;

        // Damping
        o.vx *= Math.exp(-damping * dt);
        o.vy *= Math.exp(-damping * dt);

        // Finger interaction
        if (state.finger.present) {
          const fxp = state.finger.x * state.w;
          const fyp = state.finger.y * state.h;

          const dx = o.x - fxp;
          const dy = o.y - fyp;
          const dist = Math.max(1e-4, len2(dx, dy));
          const inside = dist < (o.r * 1.05);
          const near = dist < (o.r * 1.55);

          // 突き判定は「近い＋指の速度っぽいもの」を簡易に作る
          // 速度はフレーム間差分の近似
          const pv = state.finger._pv || { x: fxp, y: fyp };
          const vdx = fxp - pv.x;
          const vdy = fyp - pv.y;
          pv.x = fxp; pv.y = fyp;
          state.finger._pv = pv;

          const fingerSpeed = len2(vdx, vdy) / Math.max(1e-4, dt);
          const poke = near && fingerSpeed > 900 * state.dpr;

          if (inside || poke) {
            // 押し出し方向は「指→球中心」の逆（球が逃げる）
            const nx = dx / dist;
            const ny = dy / dist;

            // 押し出し強度は、内部侵入の深さと指の速度で決める
            const depth = clamp((o.r - dist) / o.r, 0, 1);
            const kick = (inside ? (4200 * depth) : 0) + (poke ? clamp(fingerSpeed, 0, 2400) * 1.3 : 0);

            o.vx += nx * kick * dt;
            o.vy += ny * kick * dt;

            // ぷよ波を入れる
            o.wobbleV += (inside ? 18 * depth : 0) + (poke ? 12 : 0);

            // 発光演出
            const now = state.t;
            if (now - o.lastHitAt > 0.05) {
              o.hitGlow = 1.0;
              o.lastHitAt = now;
            }
          }
        }

        // Wobble dynamics
        o.wobbleV += (-o.wobble * wobbleK) * dt;
        o.wobbleV *= Math.exp(-wobbleD * dt);
        o.wobble += o.wobbleV * dt;

        // Hit glow decay
        o.hitGlow *= Math.exp(-3.2 * dt);

        // Soft bounds
        const pad = o.r * 0.65;
        if (o.x < pad) { o.x = pad; o.vx *= -0.45; }
        if (o.x > state.w - pad) { o.x = state.w - pad; o.vx *= -0.45; }
        if (o.y < pad) { o.y = pad; o.vy *= -0.45; }
        if (o.y > state.h - pad) { o.y = state.h - pad; o.vy *= -0.45; }

        o.x += o.vx * dt;
        o.y += o.vy * dt;
      }

      // ==== Rendering ====
      function drawOrb() {
        const o = state.orb;
        ctx.clearRect(0, 0, state.w, state.h);

        // main glow (radial)
        const glow = ctx.createRadialGradient(o.x, o.y, o.r * 0.05, o.x, o.y, o.r * 1.7);
        glow.addColorStop(0.00, `rgba(120, 220, 255, ${0.35 + 0.35 * o.hitGlow})`);
        glow.addColorStop(0.25, `rgba(50, 170, 255, ${0.22 + 0.25 * o.hitGlow})`);
        glow.addColorStop(0.65, `rgba(10, 90, 255, ${0.10 + 0.18 * o.hitGlow})`);
        glow.addColorStop(1.00, "rgba(0,0,0,0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(o.x, o.y, o.r * 1.7, 0, Math.PI * 2);
        ctx.fill();

        // blob outline with wobble
        const pts = 96;
        const baseR = o.r;
        const wob = clamp(Math.abs(o.wobble), 0, 1.2);
        const amp = baseR * (0.04 + 0.07 * wob) + baseR * 0.04 * o.hitGlow;

        // highlight direction (fake light)
        const lx = -0.55;
        const ly = -0.85;
        const lN = 1 / Math.max(1e-6, Math.hypot(lx, ly));
        const Lx = lx * lN;
        const Ly = ly * lN;

        ctx.beginPath();
        for (let i = 0; i <= pts; i++) {
          const a = (i / pts) * Math.PI * 2;
          const ca = Math.cos(a);
          const sa = Math.sin(a);

          // 波は位相を回す
          const wave =
            Math.sin(a * 3 + state.t * 3.0) * 0.55 +
            Math.sin(a * 5 - state.t * 2.2) * 0.35 +
            Math.sin(a * 9 + state.t * 1.4) * 0.18;

          // 指が近い方向を少し凹ませる（触ってる感）
          let dent = 0;
          if (state.finger.present) {
            const fxp = state.finger.x * state.w;
            const fyp = state.finger.y * state.h;
            const dx = fxp - o.x;
            const dy = fyp - o.y;
            const fd = Math.max(1e-4, Math.hypot(dx, dy));
            const fnx = dx / fd;
            const fny = dy / fd;
            const dot = fnx * ca + fny * sa; // 近い方向ほど1
            const near = clamp(1 - (fd / (baseR * 1.35)), 0, 1);
            dent = -amp * 0.55 * near * clamp(dot, 0, 1);
          }

          const rr = baseR + amp * wave + dent;

          const x = o.x + ca * rr;
          const y = o.y + sa * rr;

          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();

        // fill with gradient that suggests thickness
        const fill = ctx.createRadialGradient(o.x - baseR * 0.25, o.y - baseR * 0.35, baseR * 0.08, o.x, o.y, baseR * 1.15);
        fill.addColorStop(0.00, `rgba(170, 245, 255, ${0.90 + 0.06 * o.hitGlow})`);
        fill.addColorStop(0.22, `rgba(70, 200, 255, ${0.78 + 0.10 * o.hitGlow})`);
        fill.addColorStop(0.62, `rgba(25, 120, 255, ${0.54 + 0.12 * o.hitGlow})`);
        fill.addColorStop(1.00, `rgba(0, 50, 150, ${0.35 + 0.10 * o.hitGlow})`);
        ctx.fillStyle = fill;
        ctx.fill();

        // rim light
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.strokeStyle = `rgba(160, 235, 255, ${0.55 + 0.35 * o.hitGlow})`;
        ctx.lineWidth = Math.max(1.5, 2.5 * state.dpr);
        ctx.shadowColor = "rgba(80,200,255,0.7)";
        ctx.shadowBlur = 18 * state.dpr;
        ctx.stroke();
        ctx.restore();

        // specular highlight
        const hx = o.x + Lx * baseR * 0.42;
        const hy = o.y + Ly * baseR * 0.52;
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        const hi = ctx.createRadialGradient(hx, hy, baseR * 0.03, hx, hy, baseR * 0.38);
        hi.addColorStop(0.00, `rgba(255,255,255,${0.55 + 0.25 * o.hitGlow})`);
        hi.addColorStop(0.30, `rgba(180,240,255,${0.25 + 0.20 * o.hitGlow})`);
        hi.addColorStop(1.00, "rgba(0,0,0,0)");
        ctx.fillStyle = hi;
        ctx.beginPath();
        ctx.arc(hx, hy, baseR * 0.42, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // finger dot (subtle), on separate fx canvas so main stays clean
      function drawFinger() {
        fx.clearRect(0, 0, state.w, state.h);
        if (!state.finger.present) return;

        const x = state.finger.x * state.w;
        const y = state.finger.y * state.h;

        fx.save();
        fx.globalCompositeOperation = "screen";
        const r = Math.max(6, 10 * state.dpr);
        const g = fx.createRadialGradient(x, y, 0, x, y, r * 6.0);
        g.addColorStop(0.00, "rgba(120,220,255,0.55)");
        g.addColorStop(0.25, "rgba(80,180,255,0.22)");
        g.addColorStop(1.00, "rgba(0,0,0,0)");
        fx.fillStyle = g;
        fx.beginPath();
        fx.arc(x, y, r * 6.0, 0, Math.PI * 2);
        fx.fill();

        fx.fillStyle = "rgba(220,250,255,0.55)";
        fx.beginPath();
        fx.arc(x, y, r, 0, Math.PI * 2);
        fx.fill();
        fx.restore();
      }

      // ==== Main loop ====
      let last = performance.now();
      function tick(now) {
        const dt = clamp((now - last) / 1000, 1/240, 1/18);
        last = now;
        state.t += dt;

        // FPS (HUD用)
        state.debug.fpsS += 1 / dt;
        state.debug.fpsN += 1;
        if (state.debug.fpsN >= 18) {
          state.debug.lastFPS = state.debug.fpsS / state.debug.fpsN;
          state.debug.fpsS = 0;
          state.debug.fpsN = 0;
        }

        stepPhysics(dt);
        drawOrb();
        drawFinger();

        if (state.warn) {
          statusEl.innerHTML = `<span class="warn">${state.warn}</span>`;
        } else if (state.ready) {
          const fps = state.debug.lastFPS ? state.debug.lastFPS.toFixed(0) : "…";
          statusEl.textContent = `動作中（FPS ${fps}）`;
        } else {
          statusEl.textContent = "初期化中…";
        }

        requestAnimationFrame(tick);
      }

      // ==== Hand tracking (MediaPipe Hands) ====
      async function start() {
        resize();
        initOrb();

        // iOS Safari等での自動再生制限回避のため、ユーザー操作なしでも許可が出るケースはあるが、基本はカメラ許可ダイアログに従う
        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width: { ideal: 960 }, height: { ideal: 540 } },
            audio: false
          });
        } catch (e) {
          state.warn = "カメラが使えません。ブラウザ権限を確認してください。";
          console.error(e);
          return;
        }

        videoEl.srcObject = stream;
        await videoEl.play();

        const hands = new Hands({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
          maxNumHands: 1,
          modelComplexity: 1,
          minDetectionConfidence: 0.6,
          minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
          const lms = results.multiHandLandmarks && results.multiHandLandmarks[0];
          if (!lms) {
            state.finger.present = false;
            return;
          }

          // Index finger tip = 8
          const tip = lms[8];
          // 画面座標に合わせる。MediaPipeはx右、y下、0..1
          // 鏡像の方が「自分の手で触ってる」感が出ることが多いので左右反転
          const mirroredX = 1.0 - tip.x;

          state.finger.x = clamp(mirroredX, 0, 1);
          state.finger.y = clamp(tip.y, 0, 1);
          state.finger.z = tip.z || 0;
          state.finger.present = true;
        });

        // Camera utilsでフレーム送信
        const cam = new Camera(videoEl, {
          onFrame: async () => {
            try {
              await hands.send({ image: videoEl });
            } catch (e) {
              // たまに送信が詰まる環境があるので握りつぶしつつログ
              console.warn(e);
            }
          },
          width: 960,
          height: 540
        });
        cam.start();

        state.ready = true;
      }

      // Start render loop immediately, start camera async
      requestAnimationFrame(tick);
      start();
    })();
  </script>
</body>
</html>
