<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Water Ball Demo</title>

<style>
:root{
  --bg:#000;
  --ui:rgba(255,255,255,.82);
  --warn:#ff8a8a;
}
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
}
#stage{position:fixed; inset:0;}
canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}
#video{
  position:absolute;
  left:-9999px;
  top:-9999px;
  width:640px;
  height:480px;
  opacity:0;
}
#hud{
  position:absolute;
  left:14px;
  top:12px;
  z-index:5;
  color:var(--ui);
  font-size:12px;
  line-height:1.45;
  text-shadow:0 0 10px rgba(0,0,0,.9);
}
#hud .badge{
  display:inline-block;
  padding:2px 8px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  margin-right:6px;
}
#overlay{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  background:rgba(0,0,0,.88);
  z-index:20;
}
#panel{
  width:min(580px,calc(100vw - 32px));
  border-radius:14px;
  background:rgba(20,20,20,.95);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 14px 60px rgba(0,0,0,.55);
  padding:18px 16px;
  color:#fff;
}
#panel h1{
  margin:0 0 10px;
  font-size:17px;
}
#panel p{
  margin:0 0 12px;
  font-size:12px;
  color:rgba(255,255,255,.72);
  line-height:1.55;
}
.row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  margin-top:10px;
}
select,button{
  appearance:none;
  -webkit-appearance:none;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(0,0,0,.35);
  color:#fff;
  padding:10px 12px;
  font-size:14px;
}
button{
  cursor:pointer;
  background:rgba(90,180,255,.20);
  border-color:rgba(90,180,255,.35);
  font-weight:650;
}
#msg{
  margin-top:10px;
  font-size:12px;
  min-height:1.4em;
  color:rgba(255,255,255,.7);
}
.warn{color:var(--warn);}
</style>
</head>

<body>
<div id="stage">
  <video id="video" playsinline></video>
  <canvas id="fx"></canvas>
  <canvas id="main"></canvas>

  <div id="hud">
    <span class="badge">2 Hands</span>
    <span class="badge">Ball Count Select</span><br>
    <b>操作</b>：左右人差し指/親指で球を突けます<br>
    <span id="status">設定待ち…</span>
  </div>

  <div id="overlay">
    <div id="panel">
      <h1>起動設定</h1>
      <p>
        カメラと、水球の数を選んで開始してください。<br>
        水球が増えるほどCPU負荷は上がります。
      </p>

      <div class="row">
        <select id="cameraSelect"></select>
        <button id="refreshBtn">一覧更新</button>
      </div>

      <div class="row">
        <select id="ballCount">
          <option value="1">水球 1個</option>
          <option value="2">水球 2個</option>
          <option value="3">水球 3個</option>
        </select>
        <div></div>
      </div>

      <div class="row">
        <button id="startBtn" style="grid-column:1 / -1;">開始</button>
      </div>

      <div id="msg"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
(() => {

const canvas = document.getElementById("main");
const fxCanvas = document.getElementById("fx");
const ctx = canvas.getContext("2d");
const fx = fxCanvas.getContext("2d");

const video = document.getElementById("video");
const statusEl = document.getElementById("status");

const cameraSelect = document.getElementById("cameraSelect");
const refreshBtn = document.getElementById("refreshBtn");
const startBtn = document.getElementById("startBtn");
const msgEl = document.getElementById("msg");
const overlay = document.getElementById("overlay");
const ballCountSel = document.getElementById("ballCount");

const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const len = (x,y)=>Math.hypot(x,y);

const state = {
  w:0,h:0,dpr:1,
  t:0,
  stream:null,
  hands:null,
  pump:false,
  fingers: [
  { x: 0, y: 0, present: false, _pv: null }, // Right index
  { x: 0, y: 0, present: false, _pv: null }, // Right thumb
  { x: 0, y: 0, present: false, _pv: null }, // Left index
  { x: 0, y: 0, present: false, _pv: null }  // Left thumb
  ],
  balls:[]
};

function resize(){
  const dpr = Math.max(1, Math.min(2.5, devicePixelRatio || 1));
  state.w = Math.floor(innerWidth * dpr);
  state.h = Math.floor(innerHeight * dpr);
  state.dpr = dpr;

  canvas.width = state.w;
  canvas.height = state.h;
  fxCanvas.width = state.w;
  fxCanvas.height = state.h;
}
addEventListener("resize", resize);

function createBalls(n){
  state.balls = [];

  // 3個まで
  n = Math.max(1, Math.min(3, n));

  const baseR = Math.max(200, Math.min(state.w, state.h) * 0.07);
  const spacing = baseR * 2.6;

  const totalWidth = (n - 1) * spacing;
  const startX = state.w * 0.5 - totalWidth / 2;
  const y = state.h * 0.52;

  // 輪郭点数
  const rimCount = 40;

  for(let i = 0; i < n; i++){
    const px = startX + i * spacing;

    state.balls.push({
      // 位置
      x: px,
      y: y,
      anchorX: px,
      anchorY: y,
      vx: 0,
      vy: 0,

      // サイズ
      r: baseR,

      // 発光
      glow: 0,

      // 旧変形パラメータは残してもよいが、
      // 今後は rimOffsets / rimVelocities を主に使う
      deformX: 0,
      deformY: 0,
      deform: 0,
      deformV: 0,

      // ここから追加：輪郭点ごとの局所変形
      rimCount: rimCount,
      rimOffsets: new Array(rimCount).fill(0),     // 各輪郭点の半径変位
      rimVelocities: new Array(rimCount).fill(0)   // 各輪郭点の速度
    });
  }
}

function stepPhysics(dt){

  // dirX, dirY の方向を中心に局所変形を入れる
  // amount > 0 なら膨らむ
  // amount < 0 なら凹む
  function addLocalDeform(ball, dirX, dirY, amount){
    const count = ball.rimCount || 0;
    if(!count) return;

    const offsets = ball.rimOffsets;
    const vels = ball.rimVelocities;

    const hitAngle = Math.atan2(dirY, dirX);

    for(let i = 0; i < count; i++){
      const a = (i / count) * Math.PI * 2;

      let diff = a - hitAngle;
      while(diff > Math.PI) diff -= Math.PI * 2;
      while(diff < -Math.PI) diff += Math.PI * 2;

      const ad = Math.abs(diff);

      // 中心は狭く深く
      const coreSpread = 0.30;
      // 周囲は広くゆるく
      const sideSpread = 0.85;

      const coreW = clamp(1 - ad / coreSpread, 0, 1);
      const sideW = clamp(1 - ad / sideSpread, 0, 1);

      const core = Math.pow(coreW, 3.8);
      const side = Math.pow(sideW, 1.8);

      // 接触中心
      vels[i] += amount * (core * 1.35 + side * 0.16);

      // 先端だけ尖りすぎるのを抑える
      offsets[i] -= amount * core * 0.045;
    }
  }

  // 接触点の反対側を少し膨らませる
  function addOppositeBulge(ball, dirX, dirY, amount){
    addLocalDeform(ball, -dirX, -dirY, amount);
  }

  // 1. 各球に戻る力と指の力を加える
  for(const b of state.balls){

    const anchorX = (b.anchorX !== undefined) ? b.anchorX : state.w * 0.5;
    const anchorY = (b.anchorY !== undefined) ? b.anchorY : state.h * 0.52;

    // 位置の復元
    b.vx += (anchorX - b.x) * 2.35 * dt;
    b.vy += (anchorY - b.y) * 2.35 * dt;

    for(const f of state.fingers){
      if(!f.present) continue;

      const fxp = f.x * state.w;
      const fyp = f.y * state.h;

      // 球中心 -> 指
      const dx = fxp - b.x;
      const dy = fyp - b.y;
      const d = Math.max(0.001, len(dx, dy));

      if(d < b.r * 1.35){
        const nx = dx / d;
        const ny = dy / d;
        const near = clamp(1 - d / (b.r * 1.35), 0, 1);

        // 位置としては指から逃げる
        b.vx += (-nx) * 420 * near * dt;
        b.vy += (-ny) * 420 * near * dt;

        // 接触側を凹ませる
        addLocalDeform(b, nx, ny, -b.r * 0.28 * near);

        // 反対側を少し膨らませる
        addOppositeBulge(b, nx, ny, b.r * 0.06 * near);

        b.glow = 1;
      }
    }
  }

  // 2. 位置の減衰と移動
  for(const b of state.balls){
    b.vx *= Math.exp(-1.95 * dt);
    b.vy *= Math.exp(-1.95 * dt);

    b.x += b.vx;
    b.y += b.vy;
  }

  // 3. 球同士の衝突
  const restitution = 0.60;
  const tangentDamping = 0.95;

  for(let i = 0; i < state.balls.length; i++){
    for(let j = i + 1; j < state.balls.length; j++){

      const a = state.balls[i];
      const b = state.balls[j];

      let dx = b.x - a.x;
      let dy = b.y - a.y;
      let dist = Math.hypot(dx, dy);

      const minDist = a.r + b.r;

      if(dist === 0){
        dx = 0.001;
        dy = 0;
        dist = 0.001;
      }

      if(dist < minDist){
        const nx = dx / dist;
        const ny = dy / dist;

        const overlap = minDist - dist;
        const push = overlap * 0.5;

        // 重なり解消
        a.x -= nx * push;
        a.y -= ny * push;
        b.x += nx * push;
        b.y += ny * push;

        const rvx = b.vx - a.vx;
        const rvy = b.vy - a.vy;
        const velAlongNormal = rvx * nx + rvy * ny;

        if(velAlongNormal < 0){
          const impulse = -(1 + restitution) * velAlongNormal / 2;
          const ix = impulse * nx;
          const iy = impulse * ny;

          a.vx -= ix;
          a.vy -= iy;
          b.vx += ix;
          b.vy += iy;
        }

        const tx = -ny;
        const ty = nx;

        const vaT = a.vx * tx + a.vy * ty;
        const vbT = b.vx * tx + b.vy * ty;

        const vaN = a.vx * nx + a.vy * ny;
        const vbN = b.vx * nx + b.vy * ny;

        a.vx = nx * vaN + tx * (vaT * tangentDamping);
        a.vy = ny * vaN + ty * (vaT * tangentDamping);
        b.vx = nx * vbN + tx * (vbT * tangentDamping);
        b.vy = ny * vbN + ty * (vbT * tangentDamping);

        const hitPower =
          clamp(overlap / (a.r * 0.75), 0, 1) +
          clamp(-velAlongNormal / 600, 0, 1);

        // a は b 側が凹む
        addLocalDeform(a, nx, ny, -a.r * 0.32 * hitPower);
        addOppositeBulge(a, nx, ny, a.r * 0.08 * hitPower);

        // b は a 側が凹む
        addLocalDeform(b, -nx, -ny, -b.r * 0.32 * hitPower);
        addOppositeBulge(b, -nx, -ny, b.r * 0.08 * hitPower);

        a.glow = Math.max(a.glow, 0.45);
        b.glow = Math.max(b.glow, 0.45);
      }
    }
  }

  // 4. 輪郭点ごとの復元
  for(const b of state.balls){
    const count = b.rimCount || 0;
    if(count){
      const offsets = b.rimOffsets;
      const vels = b.rimVelocities;
      const nextOffsets = offsets.slice();

      for(let i = 0; i < count; i++){
        const im = (i - 1 + count) % count;
        const ip = (i + 1) % count;
        const imm = (i - 2 + count) % count;
        const ipp = (i + 2) % count;

        const nearAvg = (offsets[im] + offsets[ip]) * 0.5;
        const farAvg  = (offsets[imm] + offsets[ipp]) * 0.5;

        // 隣へ伝わる
        vels[i] += (nearAvg - offsets[i]) * 20.0 * dt;
        vels[i] += (farAvg  - offsets[i]) * 6.5 * dt;

        // 元の球へ戻る
        vels[i] += (-offsets[i]) * 8.5 * dt;

        // 減衰
        vels[i] *= Math.exp(-4.5 * dt);

        nextOffsets[i] += vels[i] * dt;

        // 振れ幅制限
        nextOffsets[i] = clamp(nextOffsets[i], -b.r * 0.26, b.r * 0.22);
      }

      for(let i = 0; i < count; i++){
        offsets[i] = nextOffsets[i];
      }
    }
  }

  // 5. 画面端との衝突
  for(const b of state.balls){
    const pad = b.r * 0.2;

    if(b.x < pad){
      b.x = pad;
      b.vx *= -0.34;
      addLocalDeform(b, -1, 0, -b.r * 0.10);
      addOppositeBulge(b, -1, 0, b.r * 0.04);
    }
    if(b.x > state.w - pad){
      b.x = state.w - pad;
      b.vx *= -0.34;
      addLocalDeform(b, 1, 0, -b.r * 0.10);
      addOppositeBulge(b, 1, 0, b.r * 0.04);
    }
    if(b.y < pad){
      b.y = pad;
      b.vy *= -0.34;
      addLocalDeform(b, 0, -1, -b.r * 0.10);
      addOppositeBulge(b, 0, -1, b.r * 0.04);
    }
    if(b.y > state.h - pad){
      b.y = state.h - pad;
      b.vy *= -0.34;
      addLocalDeform(b, 0, 1, -b.r * 0.10);
      addOppositeBulge(b, 0, 1, b.r * 0.04);
    }

    b.glow *= Math.exp(-2.1 * dt);
  }
}

function drawBall(b){

  const t = state.t || 0;
  const hit = b.glow || 0;
  const r = b.r;

  const count = b.rimCount || 0;
  const offsets = b.rimOffsets || [];

  // =====================================
  // 1. 輪郭点から変形パスを作る
  // =====================================
  const path = new Path2D();

  for(let i = 0; i <= count; i++){
    const k = i % count;
    const a = (k / count) * Math.PI * 2;

    const rr = r + (offsets[k] || 0);

    const x = b.x + Math.cos(a) * rr;
    const y = b.y + Math.sin(a) * rr;

    if(i === 0) path.moveTo(x, y);
    else path.lineTo(x, y);
  }
  path.closePath();

  // 押し出された側の方向をだいたい推定
  let maxOffset = -Infinity;
  let maxIndex = 0;
  for(let i = 0; i < count; i++){
    if(offsets[i] > maxOffset){
      maxOffset = offsets[i];
      maxIndex = i;
    }
  }
  const peakAngle = (maxIndex / Math.max(1, count)) * Math.PI * 2;
  const peakX = Math.cos(peakAngle);
  const peakY = Math.sin(peakAngle);

  const pulse = 0.5 + 0.5 * Math.sin(t * 1.2 + b.x * 0.002 + b.y * 0.0015);

  // =====================================
  // 2. 背面のにじみ
  // =====================================
  ctx.save();
  ctx.globalCompositeOperation = "screen";

  const backGlow = ctx.createRadialGradient(
    b.x + peakX * r * 0.14,
    b.y + peakY * r * 0.14,
    r * 0.08,
    b.x + peakX * r * 0.14,
    b.y + peakY * r * 0.14,
    r * 1.18
  );
  backGlow.addColorStop(0.00, `rgba(50,140,255,${0.06 + hit * 0.06})`);
  backGlow.addColorStop(0.45, `rgba(20,90,220,${0.05 + hit * 0.05})`);
  backGlow.addColorStop(1.00, "rgba(0,0,0,0)");

  ctx.fillStyle = backGlow;
  ctx.fill(path);
  ctx.restore();

  // =====================================
  // 3. 外側グロー
  // =====================================
  ctx.save();
  ctx.globalCompositeOperation = "screen";

  const outer = ctx.createRadialGradient(
    b.x - r * 0.10,
    b.y - r * 0.12,
    r * 0.10,
    b.x,
    b.y,
    r * 1.95
  );
  outer.addColorStop(0.00, `rgba(130,225,255,${0.18 + hit * 0.20})`);
  outer.addColorStop(0.30, `rgba(70,180,255,${0.12 + hit * 0.12})`);
  outer.addColorStop(0.70, `rgba(15,90,220,${0.05 + hit * 0.05})`);
  outer.addColorStop(1.00, "rgba(0,0,0,0)");

  ctx.fillStyle = outer;
  ctx.fill(path);
  ctx.restore();

  // =====================================
  // 4. 本体クリップ
  // =====================================
  ctx.save();
  ctx.clip(path);

  // ベース塗り
  const base = ctx.createRadialGradient(
    b.x - r * 0.32,
    b.y - r * 0.40,
    r * 0.08,
    b.x,
    b.y,
    r * 1.08
  );
  base.addColorStop(0.00, `rgba(235,255,255,0.96)`);
  base.addColorStop(0.18, `rgba(150,235,255,0.86)`);
  base.addColorStop(0.48, `rgba(55,175,255,0.68)`);
  base.addColorStop(0.78, `rgba(18,95,215,0.52)`);
  base.addColorStop(0.92, `rgba(6,48,145,0.46)`);
  base.addColorStop(1.00, `rgba(0,20,80,0.42)`);

  ctx.fillStyle = base;
  ctx.fill(path);

  // =====================================
  // 5. 下側の内部影
  // =====================================
  const innerShadow = ctx.createRadialGradient(
    b.x,
    b.y + r * 0.42,
    r * 0.08,
    b.x,
    b.y + r * 0.42,
    r * 0.98
  );
  innerShadow.addColorStop(0.00, "rgba(0,35,110,0)");
  innerShadow.addColorStop(0.55, `rgba(0,28,90,${0.10 + 0.03 * pulse})`);
  innerShadow.addColorStop(1.00, `rgba(0,12,50,${0.28 + 0.05 * hit})`);

  ctx.fillStyle = innerShadow;
  ctx.fill(path);

  // =====================================
  // 6. 内部の流体模様
  // =====================================
  ctx.save();
  ctx.globalCompositeOperation = "screen";

  for(let i = 0; i < 4; i++){
    const a = t * (0.55 + i * 0.08) + i * 1.7 + b.x * 0.001;

    const px = b.x + Math.cos(a) * r * (0.18 + 0.05 * i);
    const py = b.y + Math.sin(a * 0.9) * r * (0.14 + 0.04 * i);
    const rr = r * (0.26 + 0.05 * Math.sin(a * 1.3));

    const flow = ctx.createRadialGradient(px, py, rr * 0.02, px, py, rr);
    flow.addColorStop(0.00, `rgba(220,255,255,${0.08 + 0.02 * hit})`);
    flow.addColorStop(0.45, `rgba(120,220,255,${0.05 + 0.02 * hit})`);
    flow.addColorStop(1.00, "rgba(0,0,0,0)");

    ctx.fillStyle = flow;
    ctx.beginPath();
    ctx.arc(px, py, rr, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();

  // =====================================
  // 7. 前面ハイライト
  // =====================================
  ctx.save();
  ctx.globalCompositeOperation = "screen";

  const hx = b.x - r * 0.28 + Math.sin(t * 0.8 + b.x * 0.001) * r * 0.015;
  const hy = b.y - r * 0.38 + Math.cos(t * 0.7 + b.y * 0.001) * r * 0.012;

  const hi = ctx.createRadialGradient(
    hx, hy, r * 0.03,
    hx, hy, r * 0.55
  );
  hi.addColorStop(0.00, `rgba(255,255,255,${0.42 + hit * 0.18})`);
  hi.addColorStop(0.18, `rgba(220,250,255,${0.28 + hit * 0.14})`);
  hi.addColorStop(0.55, `rgba(150,230,255,${0.10 + hit * 0.08})`);
  hi.addColorStop(1.00, "rgba(0,0,0,0)");

  ctx.fillStyle = hi;
  ctx.beginPath();
  ctx.arc(hx, hy, r * 0.60, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // =====================================
  // 8. 細い反射帯
  // =====================================
  ctx.save();
  ctx.globalCompositeOperation = "screen";
  ctx.translate(b.x - r * 0.16, b.y - r * 0.20);
  ctx.rotate(-0.62);
  ctx.scale(1.0, 0.42);

  const band = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 0.44);
  band.addColorStop(0.00, `rgba(255,255,255,${0.18 + hit * 0.14})`);
  band.addColorStop(0.28, `rgba(220,245,255,${0.10 + hit * 0.10})`);
  band.addColorStop(1.00, "rgba(0,0,0,0)");

  ctx.fillStyle = band;
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.44, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // =====================================
  // 9. 接触時の局所反応
  // =====================================
  let nearest = null;
  let nearestDist = Infinity;

  for(const f of state.fingers){
    if(!f.present) continue;

    const fxp = f.x * state.w;
    const fyp = f.y * state.h;
    const d = Math.hypot(fxp - b.x, fyp - b.y);

    if(d < nearestDist){
      nearestDist = d;
      nearest = { x: fxp, y: fyp };
    }
  }

  if(nearest){
    const dx = nearest.x - b.x;
    const dy = nearest.y - b.y;
    const d = Math.max(0.001, Math.hypot(dx, dy));
    const near = clamp(1 - d / (r * 1.6), 0, 1);

    if(near > 0){
      const sx = b.x + dx * 0.22;
      const sy = b.y + dy * 0.22;

      ctx.save();
      ctx.globalCompositeOperation = "screen";

      const react = ctx.createRadialGradient(
        sx, sy, r * 0.02,
        sx, sy, r * 0.34
      );
      react.addColorStop(0.00, `rgba(255,255,255,${0.12 * near + 0.16 * hit})`);
      react.addColorStop(0.30, `rgba(170,235,255,${0.10 * near + 0.10 * hit})`);
      react.addColorStop(1.00, "rgba(0,0,0,0)");

      ctx.fillStyle = react;
      ctx.beginPath();
      ctx.arc(sx, sy, r * 0.36, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }
  }

  ctx.restore(); // clip end

  // =====================================
  // 10. 内側リム
  // =====================================
  ctx.save();
  ctx.globalCompositeOperation = "screen";
  ctx.lineWidth = Math.max(1.2, r * 0.045);
  ctx.strokeStyle = `rgba(160,230,255,${0.08 + hit * 0.07})`;
  ctx.stroke(path);
  ctx.restore();

  // =====================================
  // 11. ごく弱い副像
  // =====================================
  ctx.save();
  ctx.globalCompositeOperation = "screen";

  const ghost = ctx.createRadialGradient(
    b.x - r * 0.04,
    b.y - r * 0.03,
    r * 0.15,
    b.x - r * 0.04,
    b.y - r * 0.03,
    r * 0.95
  );
  ghost.addColorStop(0.00, `rgba(120,200,255,${0.015 + 0.01 * pulse})`);
  ghost.addColorStop(1.00, "rgba(0,0,0,0)");

  ctx.fillStyle = ghost;
  ctx.fill(path);

  ctx.restore();
}

function drawFingers(){
  fx.clearRect(0,0,state.w,state.h);

  for(const f of state.fingers){
    if(!f.present) continue;

    const x = f.x * state.w;
    const y = f.y * state.h;

    const g = fx.createRadialGradient(x,y,0,x,y,50);
    g.addColorStop(0,"rgba(120,220,255,.55)");
    g.addColorStop(1,"rgba(0,0,0,0)");

    fx.fillStyle = g;
    fx.beginPath();
    fx.arc(x,y,50,0,Math.PI*2);
    fx.fill();
  }
}

function draw(){
  ctx.clearRect(0,0,state.w,state.h);

  for(const b of state.balls){
    drawBall(b);
  }

  drawFingers();
}

let last = performance.now();

function loop(now){
  const dt = Math.min(0.033,(now-last)/1000);
  last = now;
  state.t += dt;

  stepPhysics(dt);
  draw();

  requestAnimationFrame(loop);
}

function setMsg(t,w=false){
  msgEl.textContent = t;
  msgEl.className = w ? "warn" : "";
}

async function refreshCameras(){

  try{
    const tmp = await navigator.mediaDevices.getUserMedia({video:true,audio:false});
    tmp.getTracks().forEach(t=>t.stop());
  }catch(e){}

  const devices = await navigator.mediaDevices.enumerateDevices();
  const cams = devices.filter(d=>d.kind==="videoinput");

  cameraSelect.innerHTML = "";

  cams.forEach((d,i)=>{
    const op = document.createElement("option");
    op.value = d.deviceId;
    op.textContent = d.label || ("Camera " + (i+1));
    cameraSelect.appendChild(op);
  });

  setMsg(cams.length + " 台のカメラを検出しました");
}

async function startSystem(){

  const deviceId = cameraSelect.value;

  const stream = await navigator.mediaDevices.getUserMedia({
    video:{
      deviceId: deviceId ? {exact:deviceId}:undefined,
      width:{ideal:960},
      height:{ideal:540}
    },
    audio:false
  });

  state.stream = stream;
  video.srcObject = stream;
  await video.play();

  const hands = new Hands({
    locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands:2,
    modelComplexity:1,
    minDetectionConfidence:0.6,
    minTrackingConfidence:0.6
  });

  hands.onResults((results) => {
    const handsLm = results.multiHandLandmarks || [];
    const handed = results.multiHandedness || [];

    // 4本に増やす
    // 0: Right index
    // 1: Right thumb
    // 2: Left index
    // 3: Left thumb
    while (state.fingers.length < 4) {
      state.fingers.push({ x: 0, y: 0, present: false, _pv: null });
    }

    for (const f of state.fingers) f.present = false;

    for (let i = 0; i < handsLm.length && i < 2; i++) {
      const lms = handsLm[i];
      const info = handed[i];
      if (!lms || !info) continue;

      const label = info.label; // "Left" or "Right"

      const indexTip = lms[8];  // 人差し指先端
      const thumbTip = lms[4];  // 親指先端

      if (!indexTip || !thumbTip) continue;

      const ix = clamp(1.0 - indexTip.x, 0, 1);
      const iy = clamp(indexTip.y, 0, 1);

      const tx = clamp(1.0 - thumbTip.x, 0, 1);
      const ty = clamp(thumbTip.y, 0, 1);

      if (label === "Right") {
        // Right index
        state.fingers[0].x = ix;
        state.fingers[0].y = iy;
        state.fingers[0].present = true;

        // Right thumb
        state.fingers[1].x = tx;
        state.fingers[1].y = ty;
        state.fingers[1].present = true;
      } else {
        // Left index
        state.fingers[2].x = ix;
        state.fingers[2].y = iy;
        state.fingers[2].present = true;

        // Left thumb
        state.fingers[3].x = tx;
        state.fingers[3].y = ty;
        state.fingers[3].present = true;
      }
    }

    for (const f of state.fingers) {
      if (!f.present) f._pv = null;
    }
  });

  state.hands = hands;
  state.pump = true;

  const pump = async ()=>{
    if(!state.pump) return;

    if(video.readyState >= 2){
      await hands.send({image:video});
    }

    requestAnimationFrame(pump);
  };
  pump();

  createBalls(parseInt(ballCountSel.value,10));

  overlay.style.display = "none";
  statusEl.textContent = "動作中";
}

refreshBtn.onclick = ()=>refreshCameras();
startBtn.onclick = ()=>startSystem();

resize();
refreshCameras();
requestAnimationFrame(loop);

})();
</script>
