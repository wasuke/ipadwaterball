<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Water Ball Demo</title>

<style>
:root{
  --bg:#000;
  --ui:rgba(255,255,255,.82);
  --warn:#ff8a8a;
}
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
}
#stage{position:fixed; inset:0;}
canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}
#video{
  position:absolute;
  left:-9999px;
  top:-9999px;
  width:640px;
  height:480px;
  opacity:0;
}
#hud{
  position:absolute;
  left:14px;
  top:12px;
  z-index:5;
  color:var(--ui);
  font-size:12px;
  line-height:1.45;
  text-shadow:0 0 10px rgba(0,0,0,.9);
}
#hud .badge{
  display:inline-block;
  padding:2px 8px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  margin-right:6px;
}
#overlay{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  background:rgba(0,0,0,.88);
  z-index:20;
}
#panel{
  width:min(580px,calc(100vw - 32px));
  border-radius:14px;
  background:rgba(20,20,20,.95);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 14px 60px rgba(0,0,0,.55);
  padding:18px 16px;
  color:#fff;
}
#panel h1{
  margin:0 0 10px;
  font-size:17px;
}
#panel p{
  margin:0 0 12px;
  font-size:12px;
  color:rgba(255,255,255,.72);
  line-height:1.55;
}
.row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  margin-top:10px;
}
select,button{
  appearance:none;
  -webkit-appearance:none;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(0,0,0,.35);
  color:#fff;
  padding:10px 12px;
  font-size:14px;
}
button{
  cursor:pointer;
  background:rgba(90,180,255,.20);
  border-color:rgba(90,180,255,.35);
  font-weight:650;
}
#msg{
  margin-top:10px;
  font-size:12px;
  min-height:1.4em;
  color:rgba(255,255,255,.7);
}
.warn{color:var(--warn);}
</style>
</head>

<body>
<div id="stage">
  <video id="video" playsinline></video>
  <canvas id="fx"></canvas>
  <canvas id="main"></canvas>

  <div id="hud">
    <span class="badge">2 Hands</span>
    <span class="badge">Ball Count Select</span><br>
    <b>操作</b>：左右人差し指で球を突けます<br>
    <span id="status">設定待ち…</span>
  </div>

  <div id="overlay">
    <div id="panel">
      <h1>起動設定</h1>
      <p>
        カメラと、水球の数を選んで開始してください。<br>
        水球が増えるほどCPU負荷は上がります。
      </p>

      <div class="row">
        <select id="cameraSelect"></select>
        <button id="refreshBtn">一覧更新</button>
      </div>

      <div class="row">
        <select id="ballCount">
          <option value="1">水球 1個</option>
          <option value="2">水球 2個</option>
          <option value="3">水球 3個</option>
          <option value="5">水球 5個</option>
          <option value="8">水球 8個</option>
        </select>
        <div></div>
      </div>

      <div class="row">
        <button id="startBtn" style="grid-column:1 / -1;">開始</button>
      </div>

      <div id="msg"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
(() => {

const canvas = document.getElementById("main");
const fxCanvas = document.getElementById("fx");
const ctx = canvas.getContext("2d");
const fx = fxCanvas.getContext("2d");

const video = document.getElementById("video");
const statusEl = document.getElementById("status");

const cameraSelect = document.getElementById("cameraSelect");
const refreshBtn = document.getElementById("refreshBtn");
const startBtn = document.getElementById("startBtn");
const msgEl = document.getElementById("msg");
const overlay = document.getElementById("overlay");
const ballCountSel = document.getElementById("ballCount");

const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const len = (x,y)=>Math.hypot(x,y);

const state = {
  w:0,h:0,dpr:1,
  t:0,
  stream:null,
  hands:null,
  pump:false,
  fingers:[
    {x:0,y:0,present:false,_pv:null},
    {x:0,y:0,present:false,_pv:null}
  ],
  balls:[]
};

function resize(){
  const dpr = Math.max(1, Math.min(2.5, devicePixelRatio || 1));
  state.w = Math.floor(innerWidth * dpr);
  state.h = Math.floor(innerHeight * dpr);
  state.dpr = dpr;

  canvas.width = state.w;
  canvas.height = state.h;
  fxCanvas.width = state.w;
  fxCanvas.height = state.h;
}
addEventListener("resize", resize);

function createBalls(n){
  state.balls = [];

  const baseR = Math.max(70, Math.min(state.w, state.h) * 0.07);
  const spacing = baseR * 2.4;

  const totalWidth = (n - 1) * spacing;
  const startX = state.w * 0.5 - totalWidth / 2;
  const y = state.h * 0.52;

  for(let i = 0; i < n; i++){

    const px = startX + i * spacing;

    state.balls.push({
      x: px,
      y: y,

      // ← それぞれの戻り位置
      anchorX: px,
      anchorY: y,

      vx: 0,
      vy: 0,
      r: baseR,
      glow: 0
    });
  }
}

function stepPhysics(dt){

  for(const b of state.balls){


    b.vx += (b.anchorX - b.x) * 5.5 * dt;
    b.vy += (b.anchorY - b.y) * 5.5 * dt;

    for(const f of state.fingers){
      if(!f.present) continue;

      const fxp = f.x * state.w;
      const fyp = f.y * state.h;

      const dx = b.x - fxp;
      const dy = b.y - fyp;
      const d = Math.max(0.001, len(dx,dy));

      if(d < b.r * 1.3){
        const nx = dx / d;
        const ny = dy / d;

        b.vx += nx * 900 * dt;
        b.vy += ny * 900 * dt;
        b.glow = 1;
      }
    }

    b.vx *= Math.exp(-3.0 * dt);
    b.vy *= Math.exp(-3.0 * dt);

    b.x += b.vx;
    b.y += b.vy;

    const pad = b.r * 0.2;

    if(b.x < pad){ b.x = pad; b.vx *= -0.45; }
    if(b.x > state.w-pad){ b.x = state.w-pad; b.vx *= -0.45; }
    if(b.y < pad){ b.y = pad; b.vy *= -0.45; }
    if(b.y > state.h-pad){ b.y = state.h-pad; b.vy *= -0.45; }

    b.glow *= Math.exp(-3.0 * dt);
  }
}

function drawBall(b){

  const outer = ctx.createRadialGradient(
    b.x,b.y,b.r*0.1,
    b.x,b.y,b.r*1.8
  );
  outer.addColorStop(0,"rgba(130,220,255,"+(0.25+b.glow*0.3)+")");
  outer.addColorStop(.5,"rgba(40,150,255,.12)");
  outer.addColorStop(1,"rgba(0,0,0,0)");

  ctx.fillStyle = outer;
  ctx.beginPath();
  ctx.arc(b.x,b.y,b.r*1.8,0,Math.PI*2);
  ctx.fill();

  const g = ctx.createRadialGradient(
    b.x-b.r*0.3,b.y-b.r*0.4,b.r*0.1,
    b.x,b.y,b.r
  );
  g.addColorStop(0,"rgba(220,255,255,.95)");
  g.addColorStop(.3,"rgba(90,220,255,.75)");
  g.addColorStop(.75,"rgba(20,120,255,.48)");
  g.addColorStop(1,"rgba(0,50,140,.28)");

  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
  ctx.fill();
}

function drawFingers(){
  fx.clearRect(0,0,state.w,state.h);

  for(const f of state.fingers){
    if(!f.present) continue;

    const x = f.x * state.w;
    const y = f.y * state.h;

    const g = fx.createRadialGradient(x,y,0,x,y,50);
    g.addColorStop(0,"rgba(120,220,255,.55)");
    g.addColorStop(1,"rgba(0,0,0,0)");

    fx.fillStyle = g;
    fx.beginPath();
    fx.arc(x,y,50,0,Math.PI*2);
    fx.fill();
  }
}

function draw(){
  ctx.clearRect(0,0,state.w,state.h);

  for(const b of state.balls){
    drawBall(b);
  }

  drawFingers();
}

let last = performance.now();

function loop(now){
  const dt = Math.min(0.033,(now-last)/1000);
  last = now;
  state.t += dt;

  stepPhysics(dt);
  draw();

  requestAnimationFrame(loop);
}

function setMsg(t,w=false){
  msgEl.textContent = t;
  msgEl.className = w ? "warn" : "";
}

async function refreshCameras(){

  try{
    const tmp = await navigator.mediaDevices.getUserMedia({video:true,audio:false});
    tmp.getTracks().forEach(t=>t.stop());
  }catch(e){}

  const devices = await navigator.mediaDevices.enumerateDevices();
  const cams = devices.filter(d=>d.kind==="videoinput");

  cameraSelect.innerHTML = "";

  cams.forEach((d,i)=>{
    const op = document.createElement("option");
    op.value = d.deviceId;
    op.textContent = d.label || ("Camera " + (i+1));
    cameraSelect.appendChild(op);
  });

  setMsg(cams.length + " 台のカメラを検出しました");
}

async function startSystem(){

  const deviceId = cameraSelect.value;

  const stream = await navigator.mediaDevices.getUserMedia({
    video:{
      deviceId: deviceId ? {exact:deviceId}:undefined,
      width:{ideal:960},
      height:{ideal:540}
    },
    audio:false
  });

  state.stream = stream;
  video.srcObject = stream;
  await video.play();

  const hands = new Hands({
    locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands:2,
    modelComplexity:1,
    minDetectionConfidence:0.6,
    minTrackingConfidence:0.6
  });

  hands.onResults((results)=>{

    for(const f of state.fingers) f.present = false;

    const lms = results.multiHandLandmarks || [];
    const handed = results.multiHandedness || [];

    for(let i=0;i<lms.length;i++){

      const tip = lms[i][8];
      const label = handed[i]?.label || "Right";

      const slot = label==="Right" ? 0 : 1;

      state.fingers[slot].x = 1 - tip.x;
      state.fingers[slot].y = tip.y;
      state.fingers[slot].present = true;
    }
  });

  state.hands = hands;
  state.pump = true;

  const pump = async ()=>{
    if(!state.pump) return;

    if(video.readyState >= 2){
      await hands.send({image:video});
    }

    requestAnimationFrame(pump);
  };
  pump();

  createBalls(parseInt(ballCountSel.value,10));

  overlay.style.display = "none";
  statusEl.textContent = "動作中";
}

refreshBtn.onclick = ()=>refreshCameras();
startBtn.onclick = ()=>startSystem();

resize();
refreshCameras();
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
