<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Touchable Water Orb Demo (OLED Black) + Camera Picker</title>
  <style>
    :root {
      --bg: #000;
      --orb-core: rgba(60, 170, 255, 0.95);
      --orb-mid: rgba(25, 120, 255, 0.55);
      --orb-faint: rgba(0, 80, 200, 0.18);
      --ui: rgba(255,255,255,0.78);
      --warn: rgba(255,120,120,0.9);
    }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
    }
    #stage {
      position: fixed;
      inset: 0;
      background: var(--bg);
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    #video {
      position: absolute;
      left: -9999px;
      top: -9999px;
      width: 640px;
      height: 480px;
      opacity: 0;
      pointer-events: none;
    }
    #hud {
      position: absolute;
      left: 14px;
      top: 12px;
      color: var(--ui);
      font-size: 12px;
      line-height: 1.45;
      user-select: none;
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
      z-index: 5;
    }
    #hud b { font-weight: 650; }
    #hud .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      margin-right: 6px;
    }
    #hud .warn { color: var(--warn); }

    /* Camera picker overlay */
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.86);
      display: grid;
      place-items: center;
      z-index: 10;
    }
    #panel {
      width: min(560px, calc(100vw - 32px));
      border-radius: 14px;
      background: rgba(20,20,20,0.9);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 14px 60px rgba(0,0,0,0.55);
      padding: 18px 16px;
      color: rgba(255,255,255,0.86);
    }
    #panel h1 {
      margin: 0 0 10px 0;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    #panel p {
      margin: 0 0 12px 0;
      font-size: 12px;
      line-height: 1.55;
      color: rgba(255,255,255,0.68);
    }
    #row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }
    select, button {
      appearance: none;
      -webkit-appearance: none;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.35);
      color: rgba(255,255,255,0.88);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }
    button {
      cursor: pointer;
      background: rgba(90,180,255,0.20);
      border: 1px solid rgba(90,180,255,0.35);
      font-weight: 650;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }
    #msg {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.55;
      color: rgba(255,255,255,0.70);
      min-height: 1.6em;
    }
    #msg.warn { color: var(--warn); }
  </style>
</head>
<body>
  <div id="stage">
    <video id="video" playsinline></video>
    <canvas id="fx"></canvas>
    <canvas id="main"></canvas>

    <div id="hud">
      <span class="badge">Webcam + Hand Tracking</span>
      <span class="badge">2D Water Orb</span><br/>
      <b>操作</b>：人差し指で球に近づいて「突く」<br/>
      <span id="status">カメラ選択待ち…</span>
    </div>

    <div id="overlay">
      <div id="panel">
        <h1>カメラを選択</h1>
        <p>
          外付けUSBカメラも含めて一覧表示します。最初に権限許可を経由しないと、機種名が「Camera 1」みたいに匿名になることがあります。<br/>
          まず「一覧を更新」を押して、許可ダイアログが出たら許可してください。
        </p>
        <div id="row">
          <select id="cameraSelect"></select>
          <button id="refreshBtn">一覧を更新</button>
        </div>
        <div id="row" style="margin-top:10px;">
          <button id="startBtn" style="grid-column: 1 / -1;" disabled>このカメラで開始</button>
        </div>
        <div id="msg"></div>
      </div>
    </div>
  </div>

  <!-- MediaPipe Hands (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <script>
    (() => {
      const canvas = document.getElementById("main");
      const fxCanvas = document.getElementById("fx");
      const ctx = canvas.getContext("2d");
      const fx = fxCanvas.getContext("2d");
      const statusEl = document.getElementById("status");
      const videoEl = document.getElementById("video");

      const overlay = document.getElementById("overlay");
      const cameraSelect = document.getElementById("cameraSelect");
      const refreshBtn = document.getElementById("refreshBtn");
      const startBtn = document.getElementById("startBtn");
      const msgEl = document.getElementById("msg");

      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const len2 = (x, y) => Math.hypot(x, y);

      const state = {
        w: 0, h: 0, dpr: 1,
        t: 0,
        finger: { x: 0, y: 0, z: 0, present: false },
        orb: {
          x: 0, y: 0,
          vx: 0, vy: 0,
          r: 90,
          wobble: 0,
          wobbleV: 0,
          hitGlow: 0,
          lastHitAt: -999,
        },
        debug: { lastFPS: 0, fpsS: 0, fpsN: 0 },
        ready: false,
        warn: "",
        stream: null,
        camRunner: null,
        hands: null,
      };

      function resize() {
        const dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
        const w = Math.floor(window.innerWidth * dpr);
        const h = Math.floor(window.innerHeight * dpr);
        canvas.width = w;
        canvas.height = h;
        fxCanvas.width = w;
        fxCanvas.height = h;
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        fxCanvas.style.width = "100%";
        fxCanvas.style.height = "100%";
        state.dpr = dpr;
        state.w = w;
        state.h = h;
      }
      window.addEventListener("resize", resize, { passive: true });

      function initOrb() {
        state.orb.x = state.w * 0.5;
        state.orb.y = state.h * 0.52;
        state.orb.vx = 0;
        state.orb.vy = 0;
        state.orb.r = Math.max(70, Math.min(state.w, state.h) * 0.10);
      }

      const anchor = { x: 0, y: 0 };

      function stepPhysics(dt) {
        const o = state.orb;
        anchor.x = state.w * 0.5;
        anchor.y = state.h * 0.52;

        const springK = 9.0;
        const damping = 5.0;
        const wobbleK = 28.0;
        const wobbleD = 8.0;

        const ax = (anchor.x - o.x) * springK;
        const ay = (anchor.y - o.y) * springK;

        o.vx += ax * dt;
        o.vy += ay * dt;

        o.vx *= Math.exp(-damping * dt);
        o.vy *= Math.exp(-damping * dt);

        if (state.finger.present) {
          const fxp = state.finger.x * state.w;
          const fyp = state.finger.y * state.h;

          const dx = o.x - fxp;
          const dy = o.y - fyp;
          const dist = Math.max(1e-4, len2(dx, dy));
          const inside = dist < (o.r * 1.05);
          const near = dist < (o.r * 1.55);

          const pv = state.finger._pv || { x: fxp, y: fyp };
          const vdx = fxp - pv.x;
          const vdy = fyp - pv.y;
          pv.x = fxp; pv.y = fyp;
          state.finger._pv = pv;

          const fingerSpeed = len2(vdx, vdy) / Math.max(1e-4, dt);
          const poke = near && fingerSpeed > 900 * state.dpr;

          if (inside || poke) {
            const nx = dx / dist;
            const ny = dy / dist;

            const depth = clamp((o.r - dist) / o.r, 0, 1);
            const kick = (inside ? (4200 * depth) : 0) + (poke ? clamp(fingerSpeed, 0, 2400) * 1.3 : 0);

            o.vx += nx * kick * dt;
            o.vy += ny * kick * dt;

            o.wobbleV += (inside ? 18 * depth : 0) + (poke ? 12 : 0);

            const now = state.t;
            if (now - o.lastHitAt > 0.05) {
              o.hitGlow = 1.0;
              o.lastHitAt = now;
            }
          }
        }

        o.wobbleV += (-o.wobble * wobbleK) * dt;
        o.wobbleV *= Math.exp(-wobbleD * dt);
        o.wobble += o.wobbleV * dt;

        o.hitGlow *= Math.exp(-3.2 * dt);

        const pad = o.r * 0.65;
        if (o.x < pad) { o.x = pad; o.vx *= -0.45; }
        if (o.x > state.w - pad) { o.x = state.w - pad; o.vx *= -0.45; }
        if (o.y < pad) { o.y = pad; o.vy *= -0.45; }
        if (o.y > state.h - pad) { o.y = state.h - pad; o.vy *= -0.45; }

        o.x += o.vx * dt;
        o.y += o.vy * dt;
      }

      function drawOrb() {
        const o = state.orb;
        ctx.clearRect(0, 0, state.w, state.h);
      
        const x = o.x, y = o.y, r = o.r;
      
        // 指→球中心の方向（凹み方向）と凹み量
        let dentDirX = 0, dentDirY = 0, dentAmount = 0;
      
        if (state.finger.present) {
          const fxp = state.finger.x * state.w;
          const fyp = state.finger.y * state.h;
          const dx = fxp - x;
          const dy = fyp - y;
          const d = Math.max(1e-4, Math.hypot(dx, dy));
          dentDirX = dx / d;
          dentDirY = dy / d;
      
          const near = clamp(1 - (d / (r * 1.20)), 0, 1);
          const wob = clamp(Math.abs(o.wobble), 0, 1.4);
      
          dentAmount = r * (0.12 * near + 0.08 * near * wob + 0.10 * near * o.hitGlow);
          dentAmount = clamp(dentAmount, 0, r * 0.30);
        }
      
        // 変形パスをPath2Dで保持（これをクリップと塗りに使う）
        const blob = new Path2D();
        const pts = 140;
        for (let i = 0; i <= pts; i++) {
          const a = (i / pts) * Math.PI * 2;
          const ca = Math.cos(a);
          const sa = Math.sin(a);
      
          const dot = ca * dentDirX + sa * dentDirY;       // 指方向に近いほど +1
          const forward = clamp(dot, 0, 1);
          const back = clamp(-dot, 0, 1);
      
          // 指側だけ凹む（指数で丸く）
          const dent = -dentAmount * Math.pow(forward, 2.2);
      
          // 反対側は少しだけ膨らむ（内部圧っぽさ）
          const bulge = dentAmount * 0.22 * Math.pow(back, 1.6);
      
          const rr = r + dent + bulge;
          const px = x + ca * rr;
          const py = y + sa * rr;
      
          if (i === 0) blob.moveTo(px, py);
          else blob.lineTo(px, py);
        }
        blob.closePath();
      
        // 外側のソフトグロー（枠線ではなく光のにじみ）
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        const outer = ctx.createRadialGradient(x, y, r * 0.12, x, y, r * 1.95);
        outer.addColorStop(0.00, `rgba(120,220,255,${0.18 + 0.26 * o.hitGlow})`);
        outer.addColorStop(0.45, `rgba(40,160,255,${0.10 + 0.18 * o.hitGlow})`);
        outer.addColorStop(0.90, `rgba(10,80,255,${0.03 + 0.08 * o.hitGlow})`);
        outer.addColorStop(1.00, "rgba(0,0,0,0)");
        ctx.fillStyle = outer;
        ctx.beginPath();
        ctx.arc(x, y, r * 1.95, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      
        // 変形形状でクリップして「内部だけ」描く
        ctx.save();
        ctx.clip(blob);
      
        // ベース塗り（変形形状そのものを塗る）
        const base = ctx.createRadialGradient(x - r * 0.25, y - r * 0.35, r * 0.10, x, y, r * 1.25);
        base.addColorStop(0.00, `rgba(190,250,255,${0.86 + 0.06 * o.hitGlow})`);
        base.addColorStop(0.25, `rgba(80,205,255,${0.68 + 0.10 * o.hitGlow})`);
        base.addColorStop(0.70, `rgba(25,120,255,${0.46 + 0.12 * o.hitGlow})`);
        base.addColorStop(1.00, `rgba(0,40,140,${0.30 + 0.10 * o.hitGlow})`);
        ctx.fillStyle = base;
        ctx.fill(blob);
      
        // 内部の揺らぎ（濃淡の流れ）
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        const t = state.t;
        const wob = clamp(Math.abs(o.wobble), 0, 1.4);
        const flow = 0.30 + 0.55 * wob + 0.35 * o.hitGlow;
      
        for (let i = 0; i < 7; i++) {
          const a = t * (0.65 + i * 0.07) + i * 1.7;
          const px = x + Math.cos(a * 1.10) * r * (0.18 + 0.10 * Math.sin(a * 0.9));
          const py = y + Math.sin(a * 0.95) * r * (0.20 + 0.10 * Math.cos(a * 1.1));
          const rr = r * (0.35 + 0.12 * Math.sin(a * 1.3));
          const g = ctx.createRadialGradient(px, py, rr * 0.05, px, py, rr);
          g.addColorStop(0.00, `rgba(200,255,255,${0.10 * flow})`);
          g.addColorStop(0.35, `rgba(120,220,255,${0.07 * flow})`);
          g.addColorStop(1.00, "rgba(0,0,0,0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(px, py, rr, 0, Math.PI * 2);
          ctx.fill();
        }
      
        // うねる筋
        ctx.globalAlpha = 0.55 * flow;
        ctx.lineWidth = Math.max(1.0, 1.6 * state.dpr);
        ctx.strokeStyle = "rgba(160,235,255,0.12)";
        for (let k = 0; k < 5; k++) {
          const phase = t * (0.9 + k * 0.06) + k * 2.1;
          ctx.beginPath();
          for (let s = 0; s <= 40; s++) {
            const u = (s / 40) * 2 - 1;
            const bend = Math.sin(phase + u * 2.6) * 0.22 + Math.sin(phase * 0.7 + u * 5.2) * 0.10;
            const xx = x + u * r * 0.90;
            const yy = y + (bend + (k - 2) * 0.12) * r;
            if (s === 0) ctx.moveTo(xx, yy);
            else ctx.lineTo(xx, yy);
          }
          ctx.stroke();
        }
        ctx.restore();
      
        // 反射ハイライト（輪郭線なし）
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        const hx = x - r * 0.28;
        const hy = y - r * 0.42;
        const hi = ctx.createRadialGradient(hx, hy, r * 0.03, hx, hy, r * 0.60);
        hi.addColorStop(0.00, `rgba(255,255,255,${0.38 + 0.25 * o.hitGlow})`);
        hi.addColorStop(0.25, `rgba(190,245,255,${0.16 + 0.18 * o.hitGlow})`);
        hi.addColorStop(1.00, "rgba(0,0,0,0)");
        ctx.fillStyle = hi;
        ctx.beginPath();
        ctx.arc(hx, hy, r * 0.70, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      
        ctx.restore(); // clip解除
      }
      
      function drawFinger() {
        fx.clearRect(0, 0, state.w, state.h);
        if (!state.finger.present) return;

        const x = state.finger.x * state.w;
        const y = state.finger.y * state.h;

        fx.save();
        fx.globalCompositeOperation = "screen";
        const r = Math.max(6, 10 * state.dpr);
        const g = fx.createRadialGradient(x, y, 0, x, y, r * 6.0);
        g.addColorStop(0.00, "rgba(120,220,255,0.55)");
        g.addColorStop(0.25, "rgba(80,180,255,0.22)");
        g.addColorStop(1.00, "rgba(0,0,0,0)");
        fx.fillStyle = g;
        fx.beginPath();
        fx.arc(x, y, r * 6.0, 0, Math.PI * 2);
        fx.fill();

        fx.fillStyle = "rgba(220,250,255,0.55)";
        fx.beginPath();
        fx.arc(x, y, r, 0, Math.PI * 2);
        fx.fill();
        fx.restore();
      }

      let last = performance.now();
      function tick(now) {
        const dt = clamp((now - last) / 1000, 1/240, 1/18);
        last = now;
        state.t += dt;

        state.debug.fpsS += 1 / dt;
        state.debug.fpsN += 1;
        if (state.debug.fpsN >= 18) {
          state.debug.lastFPS = state.debug.fpsS / state.debug.fpsN;
          state.debug.fpsS = 0;
          state.debug.fpsN = 0;
        }

        stepPhysics(dt);
        drawOrb();
        drawFinger();

        if (state.warn) {
          statusEl.innerHTML = `<span class="warn">${state.warn}</span>`;
        } else if (state.ready) {
          const fps = state.debug.lastFPS ? state.debug.lastFPS.toFixed(0) : "…";
          statusEl.textContent = `動作中（FPS ${fps}）`;
        } else {
          statusEl.textContent = "カメラ選択待ち…";
        }

        requestAnimationFrame(tick);
      }

      function setMsg(text, isWarn=false) {
        msgEl.textContent = text;
        msgEl.className = isWarn ? "warn" : "";
      }

      async function stopStream() {
        if (state.camRunner && state.camRunner.stop) {
          try { state.camRunner.stop(); } catch (e) {}
        }
        state.camRunner = null;

        if (state.stream) {
          for (const t of state.stream.getTracks()) t.stop();
        }
        state.stream = null;

        videoEl.srcObject = null;
        state.ready = false;
      }

      function populateSelect(videoInputs) {
        cameraSelect.innerHTML = "";
        if (!videoInputs.length) {
          const opt = document.createElement("option");
          opt.value = "";
          opt.textContent = "利用可能なカメラが見つかりません";
          cameraSelect.appendChild(opt);
          startBtn.disabled = true;
          return;
        }
        for (let i = 0; i < videoInputs.length; i++) {
          const d = videoInputs[i];
          const opt = document.createElement("option");
          opt.value = d.deviceId;
          // ラベルが空のときは匿名名にする
          const name = d.label && d.label.trim() ? d.label : `Camera ${i + 1}`;
          opt.textContent = name;
          cameraSelect.appendChild(opt);
        }
        startBtn.disabled = false;
      }

      async function ensurePermissionForLabels() {
        // enumerateDevicesでlabelを出すために、最小構成で一度だけ許可を取る
        // ここで得たストリームは即停止する
        try {
          const tmp = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
          for (const t of tmp.getTracks()) t.stop();
          return true;
        } catch (e) {
          return false;
        }
      }

      async function refreshCameras() {
        setMsg("カメラ一覧を取得中…");
        startBtn.disabled = true;

        if (!navigator.mediaDevices?.enumerateDevices) {
          setMsg("このブラウザはカメラ列挙に対応していません。", true);
          return;
        }

        // 先に権限を取るとlabelが出やすい
        const ok = await ensurePermissionForLabels();
        if (!ok) {
          setMsg("カメラ権限がありません。ブラウザの許可を確認してください。", true);
          return;
        }

        const devices = await navigator.mediaDevices.enumerateDevices();
        const cams = devices.filter(d => d.kind === "videoinput");
        populateSelect(cams);

        if (cams.length) {
          setMsg(`カメラ ${cams.length} 台を検出しました。USBカメラが接続済みなら一覧に出ます。`);
        } else {
          setMsg("カメラが見つかりません。接続と権限を確認してください。", true);
        }
      }

      async function startWithDeviceId(deviceId) {
        await stopStream();

        // iPad/iPhone Safariは deviceId 指定の挙動が怪しい場合があるので、
        // その時は facingMode にフォールバックする
        const constraints = deviceId
          ? { video: { deviceId: { exact: deviceId }, width: { ideal: 960 }, height: { ideal: 540 } }, audio: false }
          : { video: { facingMode: "user", width: { ideal: 960 }, height: { ideal: 540 } }, audio: false };

        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia(constraints);
        } catch (e) {
          // exact指定が失敗した場合のフォールバック
          try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            setMsg("選択したカメラの指定に失敗したため、自動選択で開始しました。", true);
          } catch (e2) {
            state.warn = "カメラが使えません。ブラウザ権限を確認してください。";
            setMsg("カメラが起動できません。権限と接続を確認してください。", true);
            console.error(e2);
            return;
          }
        }

        state.stream = stream;
        videoEl.srcObject = stream;
        await videoEl.play();

        if (!state.hands) {
          const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
          });
          hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
          });
          hands.onResults((results) => {
            const lms = results.multiHandLandmarks && results.multiHandLandmarks[0];
            if (!lms) {
              state.finger.present = false;
              return;
            }
            const tip = lms[8];
            const mirroredX = 1.0 - tip.x;
            state.finger.x = clamp(mirroredX, 0, 1);
            state.finger.y = clamp(tip.y, 0, 1);
            state.finger.z = tip.z || 0;
            state.finger.present = true;
          });
          state.hands = hands;
        }

        // Camera runner（video要素のフレームをhandsへ送る）
        const cam = new Camera(videoEl, {
          onFrame: async () => {
            try {
              await state.hands.send({ image: videoEl });
            } catch (e) {
              console.warn(e);
            }
          },
          width: 960,
          height: 540
        });
        cam.start();
        state.camRunner = cam;

        state.ready = true;
        state.warn = "";
        overlay.style.display = "none";
        initOrb();
        setMsg("");
      }

      // UI events
      refreshBtn.addEventListener("click", () => {
        refreshCameras().catch(e => {
          console.error(e);
          setMsg("カメラ一覧の取得でエラーが発生しました。", true);
        });
      });

      startBtn.addEventListener("click", () => {
        const id = cameraSelect.value;
        startWithDeviceId(id).catch(e => {
          console.error(e);
          setMsg("開始処理でエラーが発生しました。", true);
        });
      });

      // USB抜き差しで更新したくなるので自動で追従
      if (navigator.mediaDevices?.addEventListener) {
        navigator.mediaDevices.addEventListener("devicechange", () => {
          // 選択画面が出ているときだけ更新
          if (overlay.style.display !== "none") {
            refreshCameras().catch(() => {});
          }
        });
      }

      // init
      resize();
      initOrb();
      requestAnimationFrame(tick);

      // 初期表示：まず一覧更新を促す
      setMsg("「一覧を更新」を押してカメラ権限を許可してください。");
    })();
  </script>
</body>
</html>
